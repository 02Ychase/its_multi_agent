  question: "Lenovo G485亮度无法调节怎么解决"
  ground_truth: "Lenovo G485亮度无法调节的解决方案：1. 安装或更新显卡驱动；2. 安装电源管理驱动（Energy Management）；3. 检查快捷键驱动是否安装；4. 尝试在电源选项中调节屏幕亮度；5. 如以上无效，可能是硬件问题，建议送修。"
