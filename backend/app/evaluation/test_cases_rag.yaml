  expected_source: "联想手机 桌面墙纸"

- id: "rag_054"
  question: "联想手机如何添加和删除窗口小部件"
  ground_truth: "联想手机添加/删除窗口小部件的方法：添加：1. 长按桌面空白处；2. 选择'小部件'；3. 长按要添加的小部件拖动到桌面。删除：长按小部件拖动到'移除'区域。"
  expected_source: "联想手机 窗口小部件"

- id: "rag_055"
  question: "联想手机如何在桌面上添加文件夹"
  ground_truth: "联想手机在桌面添加文件夹的方法：1. 长按一个应用图标；2. 拖动到另一个应用图标上方；3. 系统会自动创建文件夹；4. 点击文件夹可重命名；5. 也可长按桌面空白处-文件夹来创建。"
  expected_source: "联想手机 桌面文件夹"

- id: "rag_056"
