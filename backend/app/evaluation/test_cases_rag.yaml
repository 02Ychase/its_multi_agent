  expected_source: "手机 系统空间不足"

- id: "rag_049"
  question: "改善手机或平板机身发热的办法"
  ground_truth: "改善手机平板发热的方法：1. 避免边充电边使用；2. 关闭不必要的后台应用；3. 降低屏幕亮度；4. 关闭GPS、蓝牙等不用的功能；5. 避免在高温环境下使用；6. 如持续异常发热，可能是电池问题，建议送修。"
  expected_source: "手机 平板 发热"

- id: "rag_050"
  question: "手机使用中个人安全隐私如何保障"
  ground_truth: "手机个人隐私安全保障方法：1. 设置锁屏密码或指纹解锁；2. 不安装来源不明的应用；3. 定期检查应用权限设置；4. 开启查找手机功能；5. 不在公共WiFi下进行敏感操作；6. 定期备份重要数据。"
  expected_source: "手机 安全隐私"

- id: "rag_051"
  question: "手机丢失后造成的信息泄露如何预防"
  ground_truth: "手机丢失后预防信息泄露的方法：1. 立即远程锁定手机（使用查找手机功能）；2. 远程清除手机数据；3. 挂失SIM卡；4. 修改所有重要账号密码（银行、社交、邮箱）；5. 通知亲友防止诈骗；6. 报警处理。"
  expected_source: "手机丢失 信息泄露"

- id: "rag_052"
  question: "联想手机如何查询产品型号"
  ground_truth: "联想手机查询产品型号的方法：1. 进入设置-关于手机；2. 查看'型号'一栏即为手机型号；3. 也可以查看手机背面或电池仓内的标签；4. 拨号界面输入*#06#可查看IMEI号。"
  expected_source: "联想手机 查询型号"

- id: "rag_053"
