  ground_truth: "联想手机自带浏览器删除历史记录的方法：1. 打开自带浏览器；2. 点击菜单键或右下角菜单图标；3. 选择'设置'或'隐私'；4. 点击'清除浏览数据'；5. 勾选'浏览历史记录'后确认清除。"
  expected_source: "联想手机 浏览器 历史记录"

- id: "rag_057"
  question: "手机如何通过数据线连接电脑实现U盘功能"
