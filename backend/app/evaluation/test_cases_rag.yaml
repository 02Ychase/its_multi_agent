# RAG 检索质量评测用例（100 条）
# 覆盖知识库全量文档主题，用于评估 Context Precision / Recall / Faithfulness / Answer Relevancy

# ============================================================
# 一、Windows 系统故障（15 条）
# ============================================================
- id: "rag_001"
  question: "电脑开机之后没有任何反应怎么办"
  ground_truth: "电脑开机无反应的排查方法：1. 检查电源线是否连接正常，尝试更换电源插座；2. 检查主机电源指示灯是否亮起；3. 尝试释放静电（拔掉电源线长按开机键15秒）；4. 检查内存条是否松动，重新插拔内存；5. 如以上无效，可能是主板或电源故障，建议送修。"
  expected_source: "开机之后无任何反应"

- id: "rag_002"
  question: "Windows 7开机蓝屏怎么解决"
  ground_truth: "Windows 7开机蓝屏的解决方案：1. 记录蓝屏错误代码；2. 尝试进入安全模式（开机按F8）；3. 安全模式下卸载最近安装的软件或驱动；4. 使用系统还原功能恢复到之前的正常状态；5. 检查内存条是否松动或损坏。"
  expected_source: "开机蓝屏 Windows 7"

- id: "rag_003"
  question: "Windows XP系统开机出现蓝屏怎么处理"
  ground_truth: "Windows XP开机蓝屏的处理方法：1. 记录蓝屏错误代码；2. 重启电脑按F8进入安全模式；3. 最后一次正确的配置启动；4. 检查新安装的硬件或软件；5. 使用系统还原或修复安装。"
  expected_source: "Windows XP 蓝屏"

- id: "rag_004"
  question: "系统提示登录进程初始化失败怎么办"
  ground_truth: "登录进程初始化失败的解决方案：该问题可能由系统文件损坏或注册表异常导致。1. 尝试进入安全模式；2. 使用系统还原恢复到之前正常的状态；3. 使用安装光盘进行启动修复；4. 如无法修复，考虑重装系统。"
  expected_source: "登录进程初始化失败"

- id: "rag_005"
  question: "Windows 7开机提示group policy client服务未能登录怎么办"
  ground_truth: "group policy client服务未能登录的解决方法：1. 重启电脑尝试；2. 进入安全模式，运行services.msc检查Group Policy Client服务状态；3. 修改注册表中该服务的Start值为2；4. 如无法解决，使用系统还原。"
  expected_source: "group policy client 未登录"

- id: "rag_006"
  question: "Lenovo G470开机黑屏或蓝屏无法进入系统"
  ground_truth: "Lenovo G470开机黑屏或蓝屏的解决方案：1. 尝试释放静电（拔掉电源和电池，长按开机键30秒）；2. 重新插拔内存条；3. 尝试进入安全模式卸载最近安装的驱动；4. 如独立显卡有问题，尝试切换到集成显卡；5. 如以上无效，建议送修。"
  expected_source: "G470 黑屏 蓝屏"

- id: "rag_007"
  question: "Windows 7中删除文件后在回收站找不到怎么办"
  ground_truth: "Windows 7中删除文件后回收站找不到的原因和解决方法：1. 使用Shift+Delete永久删除的文件不会进入回收站；2. 回收站属性中可能设置了'不将文件移到回收站'；3. 回收站空间不足导致文件被直接删除；4. 可以使用数据恢复软件尝试恢复。"
  expected_source: "Windows 7 删除文件 回收站"

- id: "rag_008"
  question: "如何使用U盘安装Windows 7操作系统"
  ground_truth: "使用U盘安装Windows 7的步骤：1. 准备一个4GB以上的U盘和Windows 7系统镜像文件；2. 使用UltraISO等工具将镜像写入U盘制作启动盘；3. 重启电脑进入BIOS设置U盘为第一启动项；4. 从U盘启动后按照安装向导完成系统安装。"
  expected_source: "U盘安装Windows 7"

- id: "rag_009"
  question: "XP和Vista系统下如何清理系统盘"
  ground_truth: "XP/Vista系统清理系统盘的方法：1. 使用系统自带的磁盘清理工具（右键C盘-属性-磁盘清理）；2. 清理临时文件和缓存；3. 卸载不常用的程序；4. 清空回收站；5. 使用第三方工具如CCleaner深度清理。"
  expected_source: "清理系统盘"

- id: "rag_010"
  question: "联想各机型如何升级到Windows 8.1"
  ground_truth: "联想机型升级Windows 8.1的方法：1. 确认当前系统为Windows 8；2. 通过应用商店免费升级到Windows 8.1；3. 升级前备份重要数据；4. 确保驱动兼容性；5. 升级后检查设备管理器中是否有未识别设备。注意事项：部分老机型可能不支持升级。"
  expected_source: "升级Windows 8.1"

- id: "rag_011"
  question: "如何通过应用商店升级到Windows 8.1"
  ground_truth: "通过应用商店升级到Windows 8.1的步骤：1. 打开Windows应用商店；2. 在首页找到Windows 8.1更新横幅；3. 点击'下载'开始升级；4. 下载完成后系统会提示重启；5. 按照提示完成升级过程。"
  expected_source: "应用商店 升级 Windows 8.1"

- id: "rag_012"
  question: "Vista系统下随机软件如何安装与卸载"
  ground_truth: "Vista系统下软件安装与卸载方法：安装：1. 运行安装程序；2. 按向导提示完成安装。卸载：1. 打开控制面板；2. 点击'程序和功能'；3. 找到要卸载的程序；4. 右键选择'卸载'。"
  expected_source: "Vista 安装 卸载"

- id: "rag_013"
  question: "英伟达显卡驱动安全类更新怎么操作"
  ground_truth: "英伟达显卡驱动安全更新方法：1. 访问NVIDIA官网下载最新驱动；2. 或使用GeForce Experience自动检测更新；3. 下载后运行安装程序；4. 选择'自定义安装'可执行清洁安装；5. 安装完成后重启电脑。"
  expected_source: "NVIDIA 显卡驱动 更新"

- id: "rag_014"
  question: "如何在全拼输入法里删除自造字"
  ground_truth: "删除TrueType造字程序自造字的方法：1. 开始菜单运行eudcedit打开造字程序；2. 选择要删除的字符代码；3. 编辑-删除字符；4. 保存退出。"
  expected_source: "全拼输入法 自造字 删除"

- id: "rag_015"
  question: "新圆梦F系列电脑运行游戏卡怎么解决"
  ground_truth: "联想新圆梦F系列运行游戏卡顿的解决方案：1. 检查显卡驱动是否为最新版本；2. 降低游戏画质设置；3. 关闭后台不必要的程序；4. 检查电脑散热是否正常；5. 如为集成显卡，部分大型游戏可能无法流畅运行。"
  expected_source: "新圆梦F 游戏卡"

# ============================================================
# 二、Office 软件问题（15 条）
# ============================================================
- id: "rag_016"
  question: "如何修改Microsoft Word的默认样式"
  ground_truth: "修改Microsoft Word默认样式的方法：1. 打开Word，点击'开始'选项卡中的'样式'组右下角的对话框启动器；2. 右键点击要修改的样式，选择'修改'；3. 在弹出的对话框中设置字体、段落等格式；4. 勾选'基于该模板的新文档'使其永久生效；5. 点击确定保存。"
  expected_source: "Microsoft Word 默认样式"

- id: "rag_017"
  question: "Word中插入的图片变成空白框怎么办"
  ground_truth: "Word 2010/2007中插入图片变成空白框的解决方法：1. 点击文件-选项-高级；2. 找到'显示文档内容'部分；3. 取消勾选'显示图片框'；4. 或在'草稿和大纲视图中显示图片框'前取消勾选；5. 确定后图片应正常显示。"
  expected_source: "Word 图片 空白框"

- id: "rag_018"
  question: "PowerPoint 2007中无法输入中文怎么办"
  ground_truth: "PowerPoint 2007无法输入中文的解决方法：1. 检查输入法是否切换到中文模式；2. 尝试更换其他中文输入法；3. 修复Office安装（控制面板-程序和功能-Office-更改-修复）；4. 检查Windows语言设置中是否启用了中文。"
  expected_source: "PowerPoint 中文输入"

- id: "rag_019"
  question: "Outlook中没有已发送邮件的记录怎么办"
  ground_truth: "Outlook没有已发送邮件记录的解决方法：1. 检查发送邮件时是否勾选了'保存已发送邮件'选项；2. 文件-选项-邮件-保存消息，确认已勾选'在已发送邮件文件夹中保存邮件副本'；3. 检查已发送邮件文件夹是否被筛选或移动。"
  expected_source: "Outlook 已发送邮件"

- id: "rag_020"
  question: "如何去掉Outlook中的段落标记等符号"
  ground_truth: "去掉Outlook段落标记的方法：1. 在邮件编辑窗口点击'设置文本格式'选项卡；2. 找到'段落'组中的显示/隐藏标记按钮（¶符号）；3. 点击取消即可隐藏段落标记；4. 或通过文件-选项-邮件-编辑器选项-显示，取消'段落标记'。"
  expected_source: "Outlook 段落标记"

- id: "rag_021"
  question: "Excel文件菜单及相关功能灰色不可用怎么办"
  ground_truth: "Excel文件菜单灰色不可用的解决方法：1. 检查文件是否以只读方式打开；2. 检查工作簿是否受保护（审阅-撤销工作表保护）；3. 检查是否处于单元格编辑状态（按Esc退出）；4. 尝试以安全模式启动Excel排除加载项冲突。"
  expected_source: "Excel 菜单 灰色"

- id: "rag_022"
  question: "如何删除Excel中的打印线"
  ground_truth: "删除Excel打印线（分页符虚线）的方法：1. 点击文件-选项-高级；2. 找到'此工作表的显示选项'；3. 取消勾选'显示分页符'；4. 确定即可隐藏打印线。"
  expected_source: "Excel 打印线 删除"

- id: "rag_023"
  question: "Excel显示#VALUE!错误信息怎么解决"
  ground_truth: "Excel显示#VALUE!错误的原因和解决方法：#VALUE!错误通常表示公式中使用了错误的数据类型。1. 检查公式中的单元格是否包含文本而非数字；2. 检查数组公式是否正确输入（需按Ctrl+Shift+Enter）；3. 检查函数参数是否正确；4. 使用VALUE函数将文本转换为数字。"
  expected_source: "Excel #VALUE! 错误"

- id: "rag_024"
  question: "Excel表导入Access 2010后时间显示错误怎么办"
  ground_truth: "Excel导入Access后时间显示错误的解决方法：1. 检查Excel中时间列的格式是否正确；2. 在Access中修改字段类型为日期/时间型；3. 导入时使用导入向导手动指定每列的数据类型；4. 如仍有问题，先将Excel另存为CSV再导入。"
  expected_source: "Excel Access 时间错误"

- id: "rag_025"
  question: "Excel中如何实现index函数自动更新"
  ground_truth: "Excel中INDEX函数自动更新的方法：1. 确保引用的数据源区域正确；2. 使用OFFSET或INDIRECT函数配合INDEX实现动态引用；3. 设置工作簿自动计算（公式-计算选项-自动）；4. 如使用VBA，可在Worksheet_Change事件中触发重算。"
  expected_source: "Excel index函数 自动更新"

- id: "rag_026"
  question: "为何Excel中的宏内容无法正常显示"
  ground_truth: "Excel宏内容无法显示的解决方法：1. 检查宏安全性设置（文件-选项-信任中心-信任中心设置-宏设置）；2. 选择'启用所有宏'或'禁用无数字签署的所有宏'；3. 确保文件保存为.xlsm格式（启用宏的工作簿）；4. 检查VBA编辑器中宏代码是否完整。"
  expected_source: "Excel 宏 无法显示"

- id: "rag_027"
  question: "为何使用Hyperlink函数创建目录时提示引用无效"
  ground_truth: "Hyperlink函数创建目录提示引用无效的原因：1. 工作表名称中包含特殊字符需要用单引号括起来；2. 引用的单元格地址格式不正确；3. 目标工作表不存在或已被重命名。解决方法：确保公式格式为=HYPERLINK('#Sheet1!A1','链接文字')。"
  expected_source: "Hyperlink 引用无效"

- id: "rag_028"
  question: "如何在Project 2010中把甘特图复制到Word文档"
  ground_truth: "在Project 2010中复制甘特图到Word的方法：1. 在Project中调整甘特图视图到合适显示范围；2. 任务选项卡-复制-复制图片；3. 选择'按屏幕显示'或'按打印尺寸'；4. 打开Word文档粘贴即可。"
  expected_source: "Project 甘特图 Word"

- id: "rag_029"
  question: "Visio 2010形状面板不见了怎么恢复"
  ground_truth: "Visio 2010形状面板恢复方法：1. 点击菜单栏'视图'；2. 选择'形状窗口'重新显示；3. 如仍不见，尝试重置工作区（工具-选项-重置）；4. 或通过文件-形状-选择需要的模具。"
  expected_source: "Visio 形状面板"

- id: "rag_030"
  question: "如何在OneNote中输入复杂的数学公式"
  ground_truth: "在OneNote 2010/2007中输入复杂数学公式的方法：1. 点击'插入'选项卡；2. 选择'公式'；3. 使用公式工具设计数学符号和结构；4. 也可以使用墨迹公式功能手写公式自动识别。"
  expected_source: "OneNote 数学公式"

# ============================================================
# 三、IE 浏览器 / 网络问题（12 条）
# ============================================================
- id: "rag_031"
  question: "Internet Explorer下载完成后不弹出提示框怎么办"
  ground_truth: "IE下载完成不弹提示框的解决方法：1. 检查IE设置-查看下载，确认下载完成通知设置；2. 检查是否被弹窗拦截器阻止；3. 重置IE设置（Internet选项-高级-重置）；4. 检查安全软件是否拦截了下载通知。"
  expected_source: "Internet Explorer 下载 提示框"

- id: "rag_032"
  question: "如何控制Internet Explorer浏览器的进程数量"
  ground_truth: "控制IE浏览器进程数量的方法：1. 在注册表中定位到HKEY_CURRENT_USER\\Software\\Microsoft\\Internet Explorer\\Main；2. 新建DWORD值TabProcGrowth；3. 设置值为0表示单进程，1表示每标签页独立进程；4. 重启IE生效。"
  expected_source: "Internet Explorer 进程数量"

- id: "rag_033"
  question: "IE浏览器打开网页时页面错乱怎么办"
  ground_truth: "IE打开网页页面错乱的解决方法：1. 检查IE版本是否过低，升级到最新版本；2. 清除浏览器缓存和Cookie；3. 检查兼容性视图设置；4. 禁用不必要的加载项；5. 重置IE设置。"
  expected_source: "IE 页面错乱"

- id: "rag_034"
  question: "IE浏览器无法启用JavaScript怎么办"
  ground_truth: "IE无法启用JavaScript的解决方法：1. Internet选项-安全-自定义级别；2. 找到'脚本'-'活动脚本'选择'启用'；3. 同时启用'Java小程序脚本'；4. 确定后重启IE。"
  expected_source: "IE JavaScript 启用"

- id: "rag_035"
  question: "IE浏览器只能打开首页无法打开其他链接怎么解决"
  ground_truth: "IE只能打开首页无法打开链接的解决方法：1. 检查默认浏览器设置；2. 重置IE设置（Internet选项-高级-重置）；3. 重新注册IE组件（管理员运行cmd，执行regsvr32 urlmon.dll等）；4. 检查hosts文件是否被篡改。"
  expected_source: "IE 只能打开首页"

- id: "rag_036"
  question: "IE浏览器页面停止响应并提示关闭程序怎么处理"
  ground_truth: "IE 9页面停止响应的解决方法：1. 禁用不必要的加载项（工具-管理加载项）；2. 清除浏览器缓存；3. 关闭加速的图形渲染（Internet选项-高级-使用软件渲染）；4. 更新显卡驱动；5. 重置IE设置。"
  expected_source: "IE 停止响应"

- id: "rag_037"
  question: "无法在IE中打印或查看网页的打印预览怎么办"
  ground_truth: "IE无法打印或查看打印预览的解决方法：1. 检查打印机驱动是否正常；2. 重置IE安全设置为默认级别；3. 在Internet选项-高级中勾选'启用增强保护模式'的反选项；4. 以管理员身份运行IE。"
  expected_source: "IE 打印预览"

- id: "rag_038"
  question: "QQ可以登录但网页打不开或者很慢怎么解决"
  ground_truth: "QQ能登录但网页打不开的解决方法：1. 检查DNS设置（设置为114.114.114.114或8.8.8.8）；2. 清除DNS缓存（cmd执行ipconfig /flushdns）；3. 检查代理设置是否正确；4. 重置Winsock（cmd执行netsh winsock reset）；5. 检查hosts文件。"
  expected_source: "QQ 网页打不开"

- id: "rag_039"
  question: "宽带连接频繁掉线怎么解决"
  ground_truth: "宽带频繁掉线的解决方法：1. 检查电话线/网线接口是否松动；2. 检查分离器是否正确连接；3. 重启Modem和路由器；4. 检查网卡驱动是否需要更新；5. 联系运营商检查线路质量。"
  expected_source: "宽带连接频繁掉线"

- id: "rag_040"
  question: "设置正确的DNS解决上网慢的问题"
  ground_truth: "通过设置DNS解决上网慢的方法：1. 打开网络和共享中心-更改适配器设置；2. 右键网络连接-属性；3. 选择Internet协议版本4-属性；4. 使用下面的DNS服务器地址：首选114.114.114.114，备用8.8.8.8；5. 确定后刷新DNS缓存。"
  expected_source: "DNS 上网慢"

- id: "rag_041"
  question: "如何解决ADSL上网慢的故障"
  ground_truth: "ADSL上网慢的解决方法：1. 检查电话线质量，排除线路干扰；2. 检查分离器连接是否正确；3. 重启Modem；4. 检查网线是否为Cat5e以上标准；5. 联系运营商检查线路信号质量；6. 排查局域网内是否有设备占用大量带宽。"
  expected_source: "ADSL 上网慢"

- id: "rag_042"
  question: "为何卸载99宿舍网查询加密锁后IE无法上网"
  ground_truth: "卸载99宿舍网查询加密锁后IE无法上网的原因：该软件可能修改了网络设置或LSP。解决方法：1. 重置Winsock（cmd执行netsh winsock reset）；2. 重置IE设置；3. 检查代理设置是否被修改；4. 重新安装网络驱动。"
  expected_source: "99宿舍网 IE无法上网"

